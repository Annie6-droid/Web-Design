<style>
.gallery-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px; /* Space between the photos */
    max-width: 800px;
    margin: 0 auto 40px auto; /* Centers the whole grid */
}

.gallery-grid figure {
    flex: 1 1 calc(45%); 
    margin: 0;
}

img {
    width: 100%;
    max-width: 350px;
    border-radius: 10px;
    border: 2px solid white;
}

video {
    display: block;
    margin: 0 auto;
    border-radius: 10px;
    border: 2px solid white;
}
</style>
<header>
    <h1>Artpiece Gallery</h1>
</header>

<div class="gallery-grid">
    <figure>
        <img src="images/image_1.jpg" alt="Photo 1" width="100">
        <figcaption>Animus</figcaption>
    </figure>
    <figure>
        <img src="images/image_2.jpg" alt="Photo 2" width="100">
        <figcaption>Balthazar</figcaption>
    </figure>
    </div>
<video controls width="250">
    <source src="videos/video.mp4" type="video/mp4">
</video>
